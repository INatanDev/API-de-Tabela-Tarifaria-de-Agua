spring.application.name=desafio_tecnico_api_tabela_tarifaria_agua

# Configurações do Banco de Dados PostgreSQL (Docker)
spring.datasource.url=jdbc:postgresql://localhost:5435/postgres
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Flyway (migrações de banco)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

#JPA
spring.jpa.hibernate.ddl-auto=validate